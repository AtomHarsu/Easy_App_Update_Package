name: easy_app_update
description: "Notify users when a new app version is available on Play Store or App Store. Supports force and soft update modes."
version: 0.0.2
homepage: https://github.com/AtomHarsu/Cross_In_App_Update_Package
repository: https://github.com/AtomHarsu/Cross_In_App_Update_Package
issue_tracker: https://github.com/AtomHarsu/Cross_In_App_Update_Package/issues

topics:
  - update
  - in-app-update
  - version-check
  - play-store
  - app-store

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  package_info_plus: ">=8.0.0 <11.0.0"
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

platforms:
  android:
  ios:
